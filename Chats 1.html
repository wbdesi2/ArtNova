<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtNov Login</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="container">

    <div class="logo">
        <img src="img/Space Age.png" alt="ArtNov Logo">
    </div>

    <h1>¡Accede a ArtNov!</h1>

    <form>

        <div class="input-group">
            <input
                type="text"
                placeholder="Email, numero o nombre de usuario"
            >
        </div>

        <div class="input-group">
            <input
                type="password"
                placeholder="Contraseña"
            >
        </div>

        <div class="options">

            <label class="remember">
                <input type="checkbox">
                <span class="custom-check"></span>
                Recordar Login
            </label>

            <a href="Verify.html">¿Olvidaste tu contraseña?</a>

        </div>

<button type="button" onclick="window.location.href='ArtNov - Home.html'">

Acceder

</button>

    </form>

    <p class="signup">
        ¿No tienes una cuenta?
        <a href="Registro.html">¡Crea una cuenta!</a>
    </p>

</div>

</body>
</html>
