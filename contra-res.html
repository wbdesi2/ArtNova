<!doctype html>
<html lang="es">

<head>

<meta charset="utf-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Chat - ArtNov</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href="css/chats2.css"
rel="stylesheet">

</head>

<body>

<div class="screen">



    <div class="chat-header">

        <button class="back-btn"
        onclick="location.href='Chats 1.html'">

            <i class="fa-solid fa-arrow-left"></i>

        </button>

        <img
        src="img/mist333.png"
        class="chat-avatar">

        <div class="chat-user">

            <h3>@Neo_city</h3>

            <span>
                Ult. vez a las 17:54pm
            </span>

        </div>

    </div>



    <div class="chat-date">

        3 de Mayo, 2026

    </div>



    <div
    class="chatSpace">

        <div id="chatText">

            <div class="message-card">

                <div class="message-user">

                    <img
                    src="img/mist333.png">

                    <span>
                        @Neo_city
                    </span>

                </div>

                <img
                class="message-image"
                src="img/calle11.png">

                <p>

                    He estado trabajando en este nuevo fondo para mi juego,
                    nunca supe como trabajar cosas desde esta perspectiva
                    pero siempre hay una primera vez para todo🤗

                </p>

            </div>

        </div>

    </div>


    <div class="chat-input">

        <button
        id="send">

            <i class="fa-solid fa-plus"></i>

        </button>

        <input
        id="talk"
        type="text"
        placeholder="Escribe algo...">

    </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/app.js"></script>
<script src="js/ejChat.js"></script>

</body>
</html>
