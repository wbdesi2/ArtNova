<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Perfil ArtNov</title>

    <link rel="stylesheet" href="css/perfil.css">

    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/3.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css">
</head>

<body>

    <div class="phone">

        <header class="top-bar">
			
		<a href="ArtNov - Home.html">
            <button class="back-btn">
                <i class="fi fi-rr-arrow-left"></i>
            </button>
		</a>

            <div class="top-icons">
                <i class="fi fi-rr-share-square"></i>
                <i class="fi fi-rr-menu-dots"></i>
            </div>
        </header>

        <section class="profile-card">

            <div class="banner">
                <img src="img/Alexander_oc.png" alt="Banner">
            </div>

            <div class="avatar">
                <img src="img/ghbhhh.png" alt="Avatar">
            </div>

            <button class="edit-btn">
                <i class="fi fi-rr-pen-square"></i>
            </button>

            <div class="bio">
                <p>artista, animador y escritor / 25 / HND / Te voy a bloquear si apoyas la IA.</p>

                <div class="stats">
                    <span><b>25</b> Seguidos</span>
                    <span><b>14</b> Seguidores</span>
                </div>
            </div>

        </section>

        <button class="commission-btn">
            <span>Pagina de Comisiones</span>

            <div class="commission-icons">
                <i class="fi fi-rr-pen-square"></i>

                <span class="circle">
                    <i class="fi fi-rr-angle-right"></i>
                </span>
            </div>
        </button>

        <nav class="tabs">
            <button class="active">Feed</button>
            <button>Galeria</button>
            <button>Colecciones</button>
        </nav>

        <section class="post">

            <div class="post-user">
                <img src="img/ghbhhh.png" alt="Avatar">
                <b>@Wild_Dreamer</b>
            </div>

            <div class="post-image">
                <img src="img/saaanprubesj.png" alt="Post">
            </div>

            <p class="post-text">
                He estado trabajando en este nuevo fondo para mi juego,
                nunca supe como trabajar cosas desde esta perspectiva pero
                siempre hay una primera vez para intentar.
            </p>

        </section>

    </div>

    <script src="js/perfil.js"></script>
</body>
</html>
